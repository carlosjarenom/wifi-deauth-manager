name: Release

on:
  push:
    tags:
      - 'v*'
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  test:
    name: Tests (PR)
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install test deps
        run: |
          python -m pip install --upgrade pip pytest
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends python3-pyqt6
      - name: Run parser tests
        run: python -m pytest test_parser.py -v

  build:
    name: Build & publish (${{ github.ref_name }})
    runs-on: ubuntu-latest
    needs: test
    if: startsWith(github.ref, 'refs/tags/') || github.event_name == 'workflow_dispatch'
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install build tooling
        run: |
          python -m pip install --upgrade pip build
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            debhelper debhelper-compat dh-python pybuild-plugin-pyproject \
            python3-all python3-setuptools python3-pip \
            python3-pyside6.qtgui python3-platformdirs \
            aircrack-ng iw lintian desktop-file-utils

      - name: Build wheel + sdist
        run: python -m build

      - name: Build Debian package
        run: |
          chmod +x debian/rules
          dpkg-buildpackage -us -uc -b
          mkdir -p artifacts
          cp ../*.deb artifacts/

      - name: Lintian check (Debian package)
        run: |
          # Lintian warnings tolerated; the goal is to have NO errors.
          lintian --no-tag-display-limit --display-info artifacts/*.deb || true

      - name: Sanity-check the wheel
        run: |
          python -m venv /tmp/v && \
          /tmp/v/bin/pip install dist/wifi_deauth_manager-*.whl && \
          /tmp/v/bin/python -c "import wifi_deauth_manager; print('module imports OK')"

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: wifi-deauth-manager-${{ github.ref_name }}
          path: |
            dist/wifi_deauth_manager-*.whl
            dist/wifi_deauth_manager-*.tar.gz
            artifacts/*.deb

      - name: Publish to PyPI
        if: startsWith(github.ref, 'refs/tags/')
        environment: pypi
        run: |
          python -m pip install --upgrade twine
          python -m twine upload dist/wifi_deauth_manager-*.whl dist/wifi_deauth_manager-*.tar.gz

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/wifi_deauth_manager-*.whl
            dist/wifi_deauth_manager-*.tar.gz
            artifacts/*.deb
          generate_release_notes: true
