name: Release

on:
  push:
    tags:
      - 'v*'
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  test:
    name: Tests (PR)
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install test deps
        run: |
          python -m pip install --upgrade pip pytest
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends python3-pyqt6
      - name: Run parser tests
        run: python -m pytest test_parser.py -v

  build:
    name: Build & publish (${{ github.ref_name }})
    runs-on: ubuntu-latest
    needs: test
    if: startsWith(github.ref, 'refs/tags/') || github.event_name == 'workflow_dispatch'
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install build tooling
        run: |
          python -m pip install --upgrade pip build
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            debhelper debhelper-compat dh-python pybuild-plugin-pyproject \
            python3-all python3-setuptools python3-pip \
            python3-pyside6 python3-platformdirs \
            aircrack-ng iw lintian desktop-file-utils \
            rpm rpm-build

      - name: Build wheel + sdist (PyPI)
        run: python -m build

      - name: Sanity-check the wheel
        run: |
          python -m venv /tmp/v && \
          /tmp/v/bin/pip install dist/wifi_deauth_manager-*.whl && \
          /tmp/v/bin/python -c "import wifi_deauth_manager; print('module imports OK')"

      - name: Build Debian package
        run: |
          chmod +x debian/rules
          dpkg-buildpackage -us -uc -b
          mkdir -p artifacts
          cp ../*.deb artifacts/

      - name: Lintian (Debian)
        run: |
          lintian --no-tag-display-limit --display-info artifacts/*.deb || true

      - name: Build RPM (Fedora/RHEL/CentOS)
        run: |
          # Generamos un tarball source local que matches el Source0 del .spec
          # (%{name}-%{version}.tar.gz). El .spec lo extrae en su %prep.
          mkdir -p ~/rpmbuild/{BUILD,RPMS,SOURCES,SRPMS,SPECS}
          tar -czf ~/rpmbuild/SOURCES/wifi-deauth-manager-1.0.0.tar.gz \
              --transform='s,^,wifi-deauth-manager-1.0.0/,' \
              --exclude='.git' --exclude='dist' --exclude='pkg' \
              --exclude='*.pkg.tar.*' --exclude='__pycache__' \
              --exclude='.venv' --exclude='.pytest_cache' \
              .
          cp rpm/wifi-deauth-manager.spec ~/rpmbuild/SPECS/
          rpmbuild -ba ~/rpmbuild/SPECS/wifi-deauth-manager.spec
          cp ~/rpmbuild/RPMS/noarch/*.rpm artifacts/

      - name: Sanity-check the RPM
        run: rpm -qpi artifacts/*.rpm | head -20

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: wifi-deauth-manager-${{ github.ref_name }}
          path: |
            dist/wifi_deauth_manager-*.whl
            dist/wifi_deauth_manager-*.tar.gz
            artifacts/*.deb
            artifacts/*.rpm

      - name: Publish to PyPI
        if: startsWith(github.ref, 'refs/tags/')
        environment: pypi
        run: |
          python -m pip install --upgrade twine
          python -m twine upload dist/wifi_deauth_manager-*.whl dist/wifi_deauth_manager-*.tar.gz

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/wifi_deauth_manager-*.whl
            dist/wifi_deauth_manager-*.tar.gz
            artifacts/*.deb
            artifacts/*.rpm
          generate_release_notes: true
